version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      tauri:
        patterns:
          - "@tauri-apps/*"
      react:
        patterns:
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
      dev-dependencies:
        dependency-type: development
        exclude-patterns:
          - "@tauri-apps/*"
          - "@types/react"
          - "@types/react-dom"

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      tauri:
        patterns:
          - "tauri"
          - "tauri-*"
          - "tauri-plugin-*"
      tracing:
        patterns:
          - "tracing"
          - "tracing-*"
      tokio:
        patterns:
          - "tokio"
          - "tokio-*"
